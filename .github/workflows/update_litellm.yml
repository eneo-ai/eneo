name: Update LiteLLM

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Get current version
        id: current
        working-directory: backend
        run: |
          version=$(grep -A1 '^name = "litellm"' uv.lock | grep version | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"

      - name: Upgrade litellm
        working-directory: backend
        run: uv lock --upgrade-package litellm

      - name: Get new version
        id: new
        working-directory: backend
        run: |
          version=$(grep -A1 '^name = "litellm"' uv.lock | grep version | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"

      - name: Detect major bump
        id: check
        run: |
          if [ "${{ steps.current.outputs.major }}" != "${{ steps.new.outputs.major }}" ]; then
            echo "is_major=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_major=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if updated
        if: steps.current.outputs.version != steps.new.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_MAJOR: ${{ steps.check.outputs.is_major }}
          OLD_VERSION: ${{ steps.current.outputs.version }}
          NEW_VERSION: ${{ steps.new.outputs.version }}
        run: |
          branch="deps/litellm-${NEW_VERSION}"
          git checkout -b "$branch"
          git add backend/uv.lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(deps): update litellm ${OLD_VERSION} -> ${NEW_VERSION}"
          git push origin "$branch"

          if [ "$IS_MAJOR" = "true" ]; then
            title="⚠️ MAJOR: Update litellm ${OLD_VERSION} → ${NEW_VERSION}"
            body="$(cat <<EOF
          ## ⚠️ Major version update — may contain breaking changes

          Updates litellm from \`${OLD_VERSION}\` to \`${NEW_VERSION}\`.

          **This is a major version bump.** Review the [LiteLLM changelog](https://github.com/BerriAI/litellm/releases) for breaking changes before merging.

          ### Checklist
          - [ ] Reviewed changelog for breaking changes
          - [ ] Tested completion models (litellm.acompletion)
          - [ ] Tested embedding models (litellm.aembedding)
          - [ ] Tested transcription models (litellm.atranscription)
          - [ ] Verified model capabilities endpoint (/capabilities/)

          Auto-generated by the [Update LiteLLM](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/update_litellm.yml) workflow.
          EOF
          )"
          else
            title="Update litellm ${OLD_VERSION} → ${NEW_VERSION}"
            body="$(cat <<EOF
          ## Summary
          - Updates litellm from \`${OLD_VERSION}\` to \`${NEW_VERSION}\`
          - This brings updated model definitions (pricing, capabilities, new models) from LiteLLM

          Auto-generated by the [Update LiteLLM](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/update_litellm.yml) workflow.
          EOF
          )"
          fi

          gh pr create \
            --base develop \
            --title "$title" \
            --body "$body"

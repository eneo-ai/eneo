[pytest]
asyncio_mode = auto
pythonpath = .
addopts = -m "not migration_isolation and not api_key_matrix"
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    migration_isolation: tests that downgrade/upgrade DB schema and must run in isolation (run with: pytest -m migration_isolation ...)
    api_key_matrix: API key access matrix tests (run with: pytest -m api_key_matrix -v -s)

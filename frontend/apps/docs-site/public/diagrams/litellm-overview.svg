<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" style="background:transparent">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
      .title { font-size: 12px; font-weight: 600; fill: #1e293b; }
      .subtitle { font-size: 10px; fill: #64748b; }
      .label { font-size: 11px; fill: #334155; }
      .small { font-size: 9px; fill: #94a3b8; }
      .box { rx: 6; ry: 6; stroke-width: 1.5; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="ah-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="ah-y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eab308"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="10" y="25" class="title" style="font-size:14px">LiteLLM Architecture Overview</text>
  <text x="10" y="42" class="subtitle">Eneo routes all AI requests through LiteLLM with dynamic per-provider field configuration</text>

  <!-- Service Layer -->
  <rect x="10" y="70" width="160" height="170" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="90" y="90" text-anchor="middle" class="title">Service Layer</text>
  <rect x="24" y="102" width="132" height="28" rx="4" ry="4" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="120" text-anchor="middle" class="label">CompletionService</text>
  <rect x="24" y="138" width="132" height="28" rx="4" ry="4" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="156" text-anchor="middle" class="label">EmbeddingService</text>
  <rect x="24" y="174" width="132" height="28" rx="4" ry="4" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="192" text-anchor="middle" class="label">TranscriptionService</text>

  <!-- Arrow: Service -> Adapter -->
  <line x1="170" y1="155" x2="198" y2="155" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ah-b)"/>

  <!-- Adapter Layer -->
  <rect x="200" y="70" width="175" height="170" class="box" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="288" y="90" text-anchor="middle" class="title">Adapter Layer</text>
  <rect x="214" y="102" width="147" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="288" y="120" text-anchor="middle" class="label">LiteLLMModelAdapter</text>
  <rect x="214" y="138" width="147" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="288" y="156" text-anchor="middle" class="label">LiteLLMEmbeddingAdapter</text>
  <rect x="214" y="174" width="147" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="288" y="192" text-anchor="middle" class="label">Credential Resolver</text>

  <!-- Arrow: Adapter -> LiteLLM -->
  <line x1="375" y1="155" x2="403" y2="155" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ah-b)"/>

  <!-- LiteLLM Core -->
  <rect x="405" y="56" width="170" height="200" class="box" fill="#faf5ff" stroke="#8b5cf6"/>
  <text x="490" y="76" text-anchor="middle" class="title">LiteLLM Core</text>
  <text x="490" y="90" text-anchor="middle" class="small">Unified API - 60+ providers</text>
  <rect x="419" y="100" width="142" height="26" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="117" text-anchor="middle" class="label">Provider Detection</text>
  <rect x="419" y="134" width="142" height="26" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="151" text-anchor="middle" class="label">Model Registry</text>
  <rect x="419" y="168" width="142" height="26" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="185" text-anchor="middle" class="label">Request Routing</text>
  <rect x="419" y="202" width="142" height="26" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="219" text-anchor="middle" class="label">Streaming Support</text>

  <!-- Arrows: LiteLLM -> Providers -->
  <line x1="575" y1="120" x2="608" y2="95" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <line x1="575" y1="155" x2="608" y2="155" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <line x1="575" y1="195" x2="608" y2="235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- Cloud Providers -->
  <rect x="610" y="36" width="260" height="140" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="740" y="56" text-anchor="middle" class="title">Cloud Providers</text>
  <rect x="624" y="66" width="70" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="659" y="82" text-anchor="middle" class="label">OpenAI</text>
  <rect x="700" y="66" width="70" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="735" y="82" text-anchor="middle" class="label">Azure</text>
  <rect x="776" y="66" width="80" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="816" y="82" text-anchor="middle" class="label">Anthropic</text>
  <rect x="624" y="96" width="70" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="659" y="112" text-anchor="middle" class="label">Gemini</text>
  <rect x="700" y="96" width="70" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="735" y="112" text-anchor="middle" class="label">Mistral</text>
  <rect x="776" y="96" width="80" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="816" y="112" text-anchor="middle" class="label">Cohere</text>
  <rect x="624" y="130" width="232" height="24" rx="4" ry="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="740" y="146" text-anchor="middle" class="small">Groq, Together AI, DeepSeek, + 50 more</text>

  <!-- Self-hosted Providers -->
  <rect x="610" y="196" width="260" height="72" class="box" fill="#fff7ed" stroke="#f97316"/>
  <text x="740" y="216" text-anchor="middle" class="title">Self-hosted</text>
  <rect x="624" y="228" width="56" height="24" rx="4" ry="4" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="652" y="244" text-anchor="middle" class="label">vLLM</text>
  <rect x="686" y="228" width="64" height="24" rx="4" ry="4" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="718" y="244" text-anchor="middle" class="label">Ollama</text>
  <rect x="756" y="228" width="100" height="24" rx="4" ry="4" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="806" y="244" text-anchor="middle" class="label">OpenAI-compat</text>

  <!-- Provider Field Config -->
  <rect x="10" y="296" width="565" height="110" class="box" fill="#fefce8" stroke="#eab308"/>
  <text x="293" y="318" text-anchor="middle" class="title">Provider Field Config (Dynamic)</text>
  <text x="293" y="334" text-anchor="middle" class="small">Capabilities API exposes per-provider field requirements to frontend</text>

  <rect x="24" y="348" width="120" height="42" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="84" y="366" text-anchor="middle" class="label">Field Definitions</text>
  <text x="84" y="380" text-anchor="middle" class="small">api_key, endpoint, ...</text>

  <rect x="156" y="348" width="120" height="42" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="216" y="366" text-anchor="middle" class="label">Provider Aliases</text>
  <text x="216" y="380" text-anchor="middle" class="small">vllm -> hosted_vllm</text>

  <rect x="288" y="348" width="136" height="42" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="356" y="366" text-anchor="middle" class="label">Required Validation</text>
  <text x="356" y="380" text-anchor="middle" class="small">create() / update() checks</text>

  <rect x="436" y="348" width="126" height="42" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="499" y="366" text-anchor="middle" class="label">Config Merge</text>
  <text x="499" y="380" text-anchor="middle" class="small">update() preserves fields</text>

  <!-- Arrow: Field Config -> Adapter -->
  <line x1="155" y1="296" x2="260" y2="242" stroke="#eab308" stroke-width="1.5" fill="none" marker-end="url(#ah-y)"/>
  <!-- Arrow: Field Config -> LiteLLM -->
  <line x1="420" y1="296" x2="490" y2="258" stroke="#eab308" stroke-width="1.5" fill="none" marker-end="url(#ah-y)"/>
</svg>

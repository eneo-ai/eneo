<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" style="background:transparent">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
      .title { font-size: 12px; font-weight: 600; fill: #1e293b; }
      .subtitle { font-size: 10px; fill: #64748b; }
      .label { font-size: 11px; fill: #334155; }
      .label-mono { font-size: 10px; fill: #334155; font-family: 'SF Mono', 'Fira Code', monospace; }
      .small { font-size: 9px; fill: #94a3b8; }
      .box { rx: 6; ry: 6; stroke-width: 1.5; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="ah-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="ah-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="ah-y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eab308"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="10" y="25" class="title" style="font-size:14px">LiteLLM Provider Routing</text>
  <text x="10" y="42" class="subtitle">How Eneo routes AI requests through LiteLLM with automatic provider detection, credential management, and dynamic field configuration</text>

  <!-- Admin UI / Frontend -->
  <rect x="10" y="64" width="200" height="145" class="box" fill="#fefce8" stroke="#eab308"/>
  <text x="110" y="84" text-anchor="middle" class="title">Admin UI (Frontend)</text>

  <rect x="24" y="96" width="172" height="28" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="110" y="114" text-anchor="middle" class="label">GET /capabilities/</text>

  <rect x="24" y="130" width="172" height="28" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="110" y="145" text-anchor="middle" class="small">Dynamic form fields per provider</text>
  <text x="110" y="155" text-anchor="middle" class="small">api_key, endpoint, api_version, ...</text>

  <rect x="24" y="164" width="172" height="28" rx="4" ry="4" fill="#fff" stroke="#fde047" stroke-width="1"/>
  <text x="110" y="182" text-anchor="middle" class="label">POST /model-providers/</text>

  <!-- Arrow: Frontend -> Backend -->
  <line x1="210" y1="136" x2="248" y2="136" stroke="#eab308" stroke-width="2" fill="none" marker-end="url(#ah-y)"/>

  <!-- Backend -->
  <rect x="250" y="64" width="210" height="145" class="box" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="355" y="84" text-anchor="middle" class="title">Backend (Provider Service)</text>

  <rect x="264" y="96" width="182" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="355" y="114" text-anchor="middle" class="label">Field Validation (create/update)</text>

  <rect x="264" y="130" width="182" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="355" y="148" text-anchor="middle" class="label">Credential Encryption</text>

  <rect x="264" y="164" width="182" height="28" rx="4" ry="4" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="355" y="182" text-anchor="middle" class="label">Config Merge (update)</text>

  <!-- Arrow: Backend -> LiteLLM -->
  <line x1="460" y1="136" x2="498" y2="136" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ah-b)"/>

  <!-- LiteLLM Router -->
  <rect x="500" y="64" width="170" height="145" class="box" fill="#faf5ff" stroke="#8b5cf6"/>
  <text x="585" y="84" text-anchor="middle" class="title">LiteLLM Router</text>

  <rect x="514" y="96" width="142" height="24" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="585" y="112" text-anchor="middle" class="label-mono">azure/gpt-4o</text>

  <rect x="514" y="126" width="142" height="24" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="585" y="142" text-anchor="middle" class="label-mono">openai/gpt-4o-mini</text>

  <rect x="514" y="156" width="142" height="24" rx="4" ry="4" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="585" y="172" text-anchor="middle" class="label-mono">hosted_vllm/llama-3</text>

  <!-- Arrows: LiteLLM -> Providers -->
  <line x1="670" y1="108" x2="708" y2="84" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <line x1="670" y1="138" x2="708" y2="138" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <line x1="670" y1="168" x2="708" y2="192" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- Providers -->
  <rect x="710" y="62" width="160" height="38" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="790" y="85" text-anchor="middle" class="label">Azure OpenAI</text>

  <rect x="710" y="118" width="160" height="38" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="790" y="141" text-anchor="middle" class="label">OpenAI</text>

  <rect x="710" y="174" width="160" height="38" class="box" fill="#fff7ed" stroke="#f97316"/>
  <text x="790" y="197" text-anchor="middle" class="label">Self-hosted (vLLM)</text>

  <!-- Provider Field Config detail -->
  <rect x="10" y="240" width="860" height="180" class="box" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="440" y="264" text-anchor="middle" class="title">Capabilities Response Shape</text>

  <!-- JSON-like structure -->
  <rect x="30" y="280" width="250" height="120" rx="4" ry="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="298" class="label-mono" style="font-size:9px">{ "providers": {</text>
  <text x="52" y="312" class="label-mono" style="font-size:9px">"openai": {</text>
  <text x="64" y="326" class="label-mono" style="font-size:9px">"modes": ["completion", ...],</text>
  <text x="64" y="340" class="label-mono" style="font-size:9px">"models": { ... },</text>
  <text x="64" y="354" class="label-mono" style="font-size:9px; fill:#b45309">"fields": [...]</text>
  <text x="52" y="368" class="label-mono" style="font-size:9px">},</text>
  <text x="52" y="382" class="label-mono" style="font-size:9px">"azure": { ... }, ...</text>
  <text x="40" y="396" class="label-mono" style="font-size:9px">}, "default_fields": [...] }</text>

  <!-- Field definition examples -->
  <rect x="310" y="280" width="260" height="120" rx="4" ry="4" fill="#fff" stroke="#eab308" stroke-width="1"/>
  <text x="440" y="298" text-anchor="middle" class="title" style="fill:#92400e">Azure Fields</text>
  <text x="320" y="316" class="label-mono" style="font-size:9px">{ name: "api_key",    required: true,  secret: true,  in: "credentials" }</text>
  <text x="320" y="332" class="label-mono" style="font-size:9px">{ name: "endpoint",   required: true,  secret: false, in: "config" }</text>
  <text x="320" y="348" class="label-mono" style="font-size:9px">{ name: "api_version", required: true,  secret: false, in: "config" }</text>
  <text x="320" y="364" class="label-mono" style="font-size:9px">{ name: "deployment_name", required: true, secret: false, in: "config" }</text>

  <rect x="600" y="280" width="250" height="120" rx="4" ry="4" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="725" y="298" text-anchor="middle" class="title" style="fill:#166534">Default Fields (most providers)</text>
  <text x="610" y="320" class="label-mono" style="font-size:9px">{ name: "api_key",  required: true,  secret: true,  in: "credentials" }</text>
  <text x="610" y="340" class="label-mono" style="font-size:9px">{ name: "endpoint", required: false, secret: false, in: "config" }</text>
  <text x="610" y="366" class="small" style="font-size:10px; fill:#64748b">Frontend renders form fields dynamically</text>
  <text x="610" y="382" class="small" style="font-size:10px; fill:#64748b">based on these definitions.</text>
</svg>
